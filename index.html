<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Leitura de Hidrômetros</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#0b2a5b;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.logo span{
color:#1bb34a;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0b2a5b;
color:white;
padding:12px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#163c78;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style>
</head>

<body>

<header>
<div class="logo">
Grupo GPS <span>Multiplan</span>
</div>
<div id="usuarioLogado"></div>
</header>

<div class="container">

<div id="loginCard" class="card">

<h2>Login</h2>

<label>Usuário</label>
<input id="user">

<label>Senha</label>
<input id="pass" type="password">

<button onclick="login()">Entrar</button>

</div>

<div id="sistema" class="hidden">

<div class="card">

<h3>Registrar Leitura</h3>

<label>Hidrômetro</label>
<select id="hidrometro"></select>

<label>Leitura Anterior</label>
<input id="anterior" readonly>

<label>Leitura Atual</label>
<input id="atual">

<label>Justificativa (se necessário)</label>
<input id="justificativa">

<button onclick="salvar()">Salvar Leitura</button>

</div>

<div class="card">

<h3>Hidrômetros Ativos</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Local</th>
<th>Tipo</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxNhjzybtMpi6kKK9U8wb0oZXm6gqgK54aeDBvngzjAaiR9dsfqIY_QQVjAHRH5wK0DiA/exec"

let usuario=""

async function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

let url=API+"?action=login&user="+user+"&pass="+pass

let r=await fetch(url)

let data=await r.json()

if(data.success){

usuario=data.usuario

document.getElementById("loginCard").classList.add("hidden")

document.getElementById("sistema").classList.remove("hidden")

document.getElementById("usuarioLogado").innerText=data.nome

carregarHidrometros()

}else{

alert("Login inválido")

}

}

async function carregarHidrometros(){

let r=await fetch(API+"?action=hidrometros")

let dados=await r.json()

let select=document.getElementById("hidrometro")
let tabela=document.getElementById("lista")

select.innerHTML=""
tabela.innerHTML=""

dados.forEach(h=>{

let opt=document.createElement("option")
opt.value=h.id
opt.text=h.id+" - "+h.local

select.appendChild(opt)

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${h.id}</td>
<td>${h.local}</td>
<td>${h.tipo}</td>
`

tabela.appendChild(tr)

})

}

async function salvar(){

let id=document.getElementById("hidrometro").value
let anterior=document.getElementById("anterior").value
let atual=document.getElementById("atual").value

let consumo=atual-anterior

let justificativa=document.getElementById("justificativa").value

let dados={

action:"salvarLeitura",
sessao:"R"+Date.now(),
tecnico:usuario,
hidrometro:id,
local:"",
tipo:"",
anterior:anterior,
atual:atual,
consumo:consumo,
variacao:0,
foto:"",
justificativa:justificativa

}

fetch(API,{

method:"POST",
body:JSON.stringify(dados)

})

alert("Leitura registrada")

}

</script>

</body>
</html>
