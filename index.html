    <script>
        // ==================== CONFIG ====================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbU19a5irszL72y9Q3X8HVL4lP07wUzyS7idITYs03TcfsnByknvCjTwNl8CG2FRmdUw/exec';
       
        let tecnico = null;
        let sessao = null;
        let hidrometros = [];
        let dataInicio = null;

        const LOCAIS = ['BARRA FREE','EXP 7','AC','MALL NOVO','RIO ANTIGO','AB','HOTZONE','ETA','EXP 5','CAG 1 CM2','CAG 2 CM2'];
        const TIPOS = ['CEDAE','REUSO','ÁGUA GELADA','PURGA','LADRÃO'];

        // ==================== FUNÇÕES DE REDE (POST - agora compatível) ====================
        async function fazerRequisicao(action, body) {
            showLoading(action === 'login' ? 'Autenticando...' : action === 'iniciar' ? 'Carregando hidrômetros...' : 'Salvando leituras...');
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...body })
                });
                
                const text = await response.text();
                const data = JSON.parse(text);
                
                if (!data.success) throw new Error(data.message || 'Erro no servidor');
                return data;
            } catch (error) {
                console.error('Erro:', error);
                throw error;
            } finally {
                hideLoading();
            }
        }

        async function fazerLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return showError('Preencha usuário e senha');

            try {
                const data = await fazerRequisicao('login', { usuario: user, senha: pass });
                tecnico = { nome: data.nome, usuario: data.usuario };
                localStorage.setItem('tecnico', JSON.stringify(tecnico));
                mostrarTelaQR();
            } catch (err) {
                showError(err.message);
            }
        }

        async function simularQR() {
            if (sessao) return finalizarRonda();

            try {
                const data = await fazerRequisicao('iniciar', { usuario: tecnico.usuario });
                
                sessao = { id: data.sessaoId, inicio: new Date() };
                dataInicio = new Date().toISOString();
                
                hidrometros = data.hidrometros.map(h => ({
                    id: h.id, local: h.local, tipo: h.tipo,
                    leituraAnterior: parseFloat(h.leituraAnterior) || 0,
                    leituraAtual: '', foto: null, justificativa: '', variacao: 0
                }));

                mostrarTelaLeitura();
            } catch (err) {
                alert('Erro ao iniciar: ' + err.message);
            }
        }

        async function finalizarRonda() {
            const incompletos = hidrometros.filter(h => !isCompleto(h));
            if (incompletos.length > 0) {
                alert(`Ainda faltam ${incompletos.length} hidrômetros!`);
                const primeiro = incompletos[0];
                const idx = LOCAIS.indexOf(primeiro.local);
                if (idx >= 0) {
                    document.getElementById(`local-${idx}`).classList.add('expandido');
                    document.getElementById(`item-${primeiro.id}`).scrollIntoView({ behavior: 'smooth' });
                }
                return;
            }
