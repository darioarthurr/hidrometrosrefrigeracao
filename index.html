<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwBbY3PpzZfmzw7raBf1k5714hlsmI5YpoHHLFWSDILMHiaV0vYKNLbuoWjX12RBAB5SA/exec"

let tecnico=null
let sessao=null
let hidrometros=[]

async function fazerLogin(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

const res = await fetch(`${APPS_SCRIPT_URL}?action=login&user=${user}&pass=${pass}`)

const data = await res.json()

if(data.success){

tecnico=data

localStorage.setItem("tecnico",JSON.stringify(tecnico))

mostrarTelaQR()

}else{

alert(data.message)

}

}

function mostrarTelaQR(){

document.getElementById("loginScreen").style.display="none"

document.getElementById("qrScreen").style.display="block"

document.getElementById("nomeTecnico").innerText=tecnico.nome

iniciarScannerQR()

}

function iniciarScannerQR(){

const qr = new Html5Qrcode("reader")

qr.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(decoded)=>{

if(decoded==="TORRES-HIDROMETROS"){

qr.stop()

iniciarSessao()

}

}

)

}

async function iniciarSessao(){

const res = await fetch(`${APPS_SCRIPT_URL}?action=iniciar&tecnico=${tecnico.usuario}`)

const data = await res.json()

sessao={
id:data.sessaoId,
inicio:new Date()
}

hidrometros=data.hidrometros.map(h=>({

...h,
leituraAtual:"",
foto:null,
justificativa:"",
variacao:0

}))

mostrarTelaLeitura()

}

async function finalizarRonda(){

const dados={
action:"salvar",
sessao:sessao,
tecnico:tecnico.usuario,
leituras:hidrometros.map(h=>({

id:h.id,
local:h.local,
tipo:h.tipo,
leituraAnterior:h.leituraAnterior,
leituraAtual:h.leituraAtual,
consumo:h.leituraAtual-h.leituraAnterior,
variacao:h.variacao,
foto:h.foto,
justificativa:h.justificativa

}))

}

await fetch(APPS_SCRIPT_URL,{
method:"POST",
body:JSON.stringify(dados)
})

alert("Ronda finalizada")

}

function capturarFoto(id,input){

const file=input.files[0]

const reader=new FileReader()

reader.onload=function(e){

const img=new Image()

img.src=e.target.result

img.onload=function(){

const canvas=document.createElement("canvas")

const MAX=1280

const scale=MAX/img.width

canvas.width=MAX

canvas.height=img.height*scale

const ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0,canvas.width,canvas.height)

const compressed=canvas.toDataURL("image/jpeg",0.7)

const h=hidrometros.find(x=>x.id===id)

h.foto=compressed

}

}

reader.readAsDataURL(file)

}

</script>
