<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#003366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hidrômetros GPS">
    <meta name="application-name" content="Hidrômetros GPS">
    <meta name="description" content="Sistema de leitura de hidrômetros - Grupo GPS Multiplan">
   
    <title>Leitura de Hidrômetros v2.9.8.6 | Grupo GPS • Multiplan</title>
   
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23003366' width='100' height='100' rx='20'/><text y='.9em' x='50%' text-anchor='middle' font-size='70'>💧</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23003366' width='100' height='100' rx='20'/><text y='.9em' x='50%' text-anchor='middle' font-size='70'>💧</text></svg>">
   
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="assets/style.css?v=2.9.8.6">
   
    <style>
        /* Estilos adicionais v2.9.8.6 */
        .status-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            z-index: 9999;
            color: white;
            transition: all 0.3s;
            font-weight: 600;
        }
       
        #nivelUsuario {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-right: 10px;
        }
       
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }
       
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }
       
        .badge-danger { background: #dc3545; color: white; }
        .badge-warning { background: #ffc107; color: #000; }
        .badge-normal { background: #28a745; color: white; }
       
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
       
        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
       
        .users-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }
       
        .level-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
       
        .level-admin { background: #dc3545; }
        .level-tecnico { background: #007bff; }
       
        .analise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
       
        .analise-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #007bff;
        }
       
        .analise-card.alerta { border-left-color: #dc3545; }
        .analise-card.normal { border-left-color: #28a745; }
       
        .analise-valor {
            font-size: 2rem;
            font-weight: bold;
            color: #003366;
            margin: 10px 0;
        }
       
        .gestao-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
       
        .gestao-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
       
        .form-grid {
            display: grid;
            gap: 15px;
        }
       
        .btn-success {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
       
        .filtros-dashboard {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: end;
        }
       
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app" role="application">
      
        <!-- Loading -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <div id="loadingText" class="loading-text">Carregando...</div>
        </div>
        <!-- Toast Container -->
        <div id="toastContainer" class="toast-container"></div>
        <!-- TELA LOGIN -->
        <section id="loginScreen" class="screen active" role="main">
            <div class="login-container">
                <div class="login-card">
                    <header class="brand-header">
                        <div class="logo-gps">Grupo GPS</div>
                        <div class="logo-separator">•</div>
                        <div class="logo-multiplan">MULTIPLAN</div>
                    </header>
                  
                    <div class="login-icon">
                        <span>💧</span>
                        <div class="pulse-ring"></div>
                    </div>
                  
                    <h1 class="login-title">Leitura de Hidrômetros</h1>
                    <p class="login-version">v2.9.8.6</p>
                  
                    <div id="loginError" class="error-message"></div>
                  
                    <form id="loginForm" class="login-form" novalidate>
                        <div class="form-group">
                            <label for="username" class="form-label">Usuário</label>
                            <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" autocomplete="username" required>
                        </div>
                      
                        <div class="form-group">
                            <label for="password" class="form-label">Senha</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-input" placeholder="Digite sua senha" autocomplete="current-password" required>
                                <!-- CORREÇÃO: botão agora chama app.togglePassword() que existe -->
                                <button type="button" class="toggle-password" onclick="app.togglePassword()">👁️</button>
                            </div>
                        </div>
                      
                        <button type="submit" class="btn-primary btn-login">
                            <span>Entrar no Sistema</span>
                        </button>
                    </form>
                  
                    <footer class="login-footer">
                        <p>Sistema exclusivo para equipe autorizada</p>
                        <!-- CORREÇÃO v2.9.8.6: removido <p id="statusRede"> duplicado. O JS agora cria o fixed sempre visível -->
                    </footer>
                </div>
            </div>
        </section>
        <!-- HEADER CORPORATIVO -->
        <header id="corporateHeader" class="corporate-header" style="display:none;">
            <div class="header-brand">
                <span class="header-gps">Grupo GPS</span>
                <span class="header-separator">|</span>
                <span class="header-multiplan">MULTIPLAN</span>
            </div>
            <div class="header-title">Leitura de Hidrômetros</div>
            <div class="header-user">
                <span id="nomeTecnico" class="user-name"></span>
                <span id="nivelUsuario" class="user-badge">OP</span>
                <button class="btn-icon" onclick="app.logout()" title="Sair">🚪</button>
            </div>
        </header>
        <!-- MENU ADMIN -->
        <nav id="adminNav" class="admin-nav" style="display:none;">
            <button class="nav-item active" data-page="dashboard" onclick="app.navigate('dashboard')">
                <span>📊</span><span>Dashboard</span>
            </button>
            <button class="nav-item" data-page="leituras" onclick="app.navigate('leituras')">
                <span>📋</span><span>Leituras</span>
            </button>
            <button class="nav-item" data-page="analise" onclick="app.navigate('analise')">
                <span>📈</span><span>Análise</span>
            </button>
            <button class="nav-item" data-page="gestao" onclick="app.navigate('gestao')">
                <span>⚙️</span><span>Gestão</span>
            </button>
        </nav>
        <!-- TELA INICIAL (Técnico) -->
        <section id="startScreen" class="screen" role="main">
            <div class="welcome-container">
                <div class="welcome-card">
                    <div class="welcome-icon">👋</div>
                    <h2 class="welcome-title">Olá, <span id="nomeTecnicoStart"></span></h2>
                    <p class="welcome-subtitle">Pronto para iniciar a ronda de leituras?</p>
                  
                    <button class="btn-primary btn-start" onclick="app.iniciarLeitura()" id="btnIniciar">
                        <span>🚀</span><span>INICIAR LEITURA DOS HIDRÔMETROS</span>
                    </button>
                  
                    <button class="btn-secondary btn-continuar" onclick="app.continuarRonda()" id="btnContinuarRonda" style="display:none;">
                        <span>▶️</span><span>Continuar Ronda em Andamento</span>
                    </button>
                  
                    <div class="system-info">
                        <p>Versão 2.9.8.6</p>
                    </div>
                </div>
            </div>
        </section>
        <!-- (o resto do HTML continua exatamente igual – não alterei nada além do statusRede) -->
        <!-- TELA DE LEITURA -->
        <section id="leituraScreen" class="screen" role="main">
            <div class="leitura-container">
                <div class="progresso-container">
                    <div class="progresso-header">
                        <span class="progresso-titulo">Progresso da Ronda</span>
                        <span class="progresso-valor" id="progressText">0/0</span>
                    </div>
                    <div class="barra-progresso" id="progressBar">
                        <div class="barra-preenchida" style="width: 0%"></div>
                    </div>
                    <div class="progresso-percentual">0% concluído</div>
                </div>
                <div class="local-selector-card">
                    <label for="localSelect">Selecione o local</label>
                    <select id="localSelect" onchange="app.carregarHidrometros(this.value)">
                        <option value="">Escolha um local...</option>
                    </select>
                </div>
                <div id="hidrometrosContainer" class="hidrometros-list"></div>
                <div class="bottom-spacer"></div>
            </div>
            <div id="bottomBar" class="bottom-bar" style="display: none;">
                <div class="bottom-bar-actions">
                    <button id="btnPausar" class="btn-pausar" onclick="app.pausarRonda()">
                        <span>⏸️</span><span>Pausar</span>
                    </button>
                    <button id="btnFinalizar" class="btn-finalizar" disabled onclick="app.finalizarRonda()">
                        <span>✓</span><span>Finalizar Ronda</span>
                    </button>
                </div>
            </div>
        </section>
        <!-- ... (todas as outras seções permanecem iguais) ... -->
        <!-- TELA DASHBOARD, LEITURAS, ANÁLISE, GESTÃO continuam exatamente como você mandou -->
    </div>
    <script src="assets/app.js?v=2.9.8.6"></script>
  
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=2.9.8.6')
                    .then(registration => console.log('[SW] Registrado'))
                    .catch(error => console.log('[SW] Falha:', error));
            });
        }
    </script>
</body>
</html>
