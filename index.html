<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#003366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hidrômetros GPS">
    <title>Leitura de Hidrômetros v2.5.2 | Grupo GPS • Multiplan</title>
   
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
   
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
   
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="app">
        <!-- LOADING GLOBAL - CORRIGIDO -->
        <div id="loadingGlobal" class="loading-overlay">
            <div class="spinner"></div>
            <div id="loadingText" class="loading-text">Carregando...</div>
        </div>

        <!-- TOAST -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- TELA LOGIN -->
        <section id="loginScreen" class="screen active">
            <div class="login-container">
                <div class="login-card">
                    <div class="brand-header">
                        <div class="logo-gps">Grupo GPS</div>
                        <div class="logo-separator">•</div>
                        <div class="logo-multiplan">MULTIPLAN</div>
                    </div>
                    <div class="login-icon">
                        <span>💧</span>
                        <div class="pulse-ring"></div>
                    </div>
                    <h1 class="login-title">Leitura de Hidrômetros</h1>
                    <p class="login-version">v2.5.2</p>
                    <div id="loginError" class="error-message"></div>
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label class="form-label">Usuário</label>
                            <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" autocomplete="off" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Senha</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
                                <button type="button" class="toggle-password" onclick="app.togglePassword()">👁️</button>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary btn-login">
                            <span>Entrar no Sistema</span>
                            <div class="btn-shine"></div>
                        </button>
                    </form>
                    <div class="login-footer">
                        <p>Sistema exclusivo para equipe autorizada</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- HEADER CORPORATIVO -->
        <header id="corporateHeader" class="corporate-header" style="display:none;">
            <div class="header-brand">
                <span class="header-gps">Grupo GPS</span>
                <span class="header-separator">|</span>
                <span class="header-multiplan">MULTIPLAN</span>
            </div>
            <div class="header-title">Leitura de Hidrômetros</div>
            <div class="header-user">
                <span id="userName" class="user-name"></span>
                <span id="userBadge" class="user-badge">OP</span>
                <button class="btn-icon" onclick="app.logout()" title="Sair">🚪</button>
            </div>
        </header>

        <!-- MENU ADMIN -->
        <nav id="adminNav" class="admin-nav" style="display:none;">
            <button class="nav-item active" data-page="dashboard" onclick="app.navigate('dashboard')"><span class="nav-icon">📊</span><span>Dashboard</span></button>
            <button class="nav-item" data-page="leituras" onclick="app.navigate('leituras')"><span class="nav-icon">📋</span><span>Leituras</span></button>
            <button class="nav-item" data-page="analise" onclick="app.navigate('analise')"><span class="nav-icon">📈</span><span>Análise</span></button>
            <button class="nav-item" data-page="gestao" onclick="app.navigate('gestao')"><span class="nav-icon">⚙️</span><span>Gestão</span></button>
        </nav>

        <!-- TELA INICIAL -->
        <section id="startScreen" class="screen">
            <div class="welcome-container">
                <div class="welcome-card glass-effect">
                    <div class="welcome-icon">👋</div>
                    <h2 class="welcome-title">Olá, <span id="nomeTecnico"></span></h2>
                    <p class="welcome-subtitle">Pronto para iniciar a ronda de leituras?</p>
                    <div class="welcome-stats" id="welcomeStats" style="display:none;">
                        <div class="stat-item"><span class="stat-value" id="statPendentes">0</span><span class="stat-label">Pendentes</span></div>
                    </div>
                    <button class="btn-primary btn-start" onclick="app.iniciarLeitura()">
                        <span class="btn-icon">🚀</span>
                        <span>INICIAR LEITURA DOS HIDRÔMETROS</span>
                    </button>
                    <button class="btn-secondary btn-sync" onclick="app.sincronizarPendentes()" id="btnSyncPendentes" style="display:none;">
                        <span class="btn-icon">☁️</span>
                        <span>Sincronizar <span id="countPendentes">0</span> pendentes</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- TELA DE LEITURA -->
        <section id="leituraScreen" class="screen">
            <div class="leitura-container">
                <div class="progress-card">
                    <div class="progress-header">
                        <span class="progress-title">Progresso da Ronda</span>
                        <span class="progress-value" id="progressoTexto">0/0</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progressoBarra" class="progress-bar-fill" style="width:0%"></div>
                    </div>
                    <div class="progress-meta">
                        <span id="progressoPercent">0%</span> concluído
                    </div>
                </div>

                <div class="local-selector-card">
                    <label class="selector-label">Selecione o local</label>
                    <div class="custom-select">
                        <select id="localSelect" onchange="app.mudarLocal(this.value)">
                            <option value="">Escolha um local...</option>
                        </select>
                        <div class="select-arrow">▼</div>
                    </div>
                </div>

                <div id="hidrometrosContainer" class="hidrometros-list"></div>
                <div class="bottom-spacer"></div>
            </div>

            <div id="bottomBar" class="bottom-bar">
                <button id="btnFinalizar" class="btn-finalizar" disabled onclick="app.finalizarRonda()">
                    <span class="btn-icon">✓</span>
                    <span>Finalizar Ronda</span>
                </button>
            </div>
        </section>

        <!-- Telas Admin (dashboard e leituras) - mantidas como antes -->
        <section id="dashboardScreen" class="screen admin-screen">...</section>
        <section id="leiturasAdminScreen" class="screen admin-screen">...</section>

        <!-- MODAL -->
        <div id="modalDetalhes" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Detalhes da Leitura</h3>
                    <button class="btn-close" onclick="app.closeModal()">×</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
