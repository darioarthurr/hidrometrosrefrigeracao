<!-- 
VERSÃO: v1.12 – 13/03/2026 15:10 -03
Alterações:
- Exibe "Consumo do dia" e "Variação % do consumo" (baseado em consumo anterior)
- Justificativa obrigatória se: consumo dia < 0 OU variação consumo > +20%
- Se consumo anterior = 0 ou não existir → não dispara alerta de aumento
- Layout mantido (botão foto abaixo do input, espaçamento bom)
-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#003366">
    <title>Leitura de Hidrômetros</title>
    <style>
        :root {
            --gps-blue: #003366;
            --gps-blue-light: #004080;
            --multiplan-green: #00A651;
            --multiplan-green-light: #00C261;
            --white: #FFFFFF;
            --gray-light: #F5F7FA;
            --gray-medium: #E1E8ED;
            --gray-dark: #5A6C7D;
            --text-dark: #2C3E50;
            --danger: #E74C3C;
            --warning: #F39C12;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI',sans-serif; background:linear-gradient(160deg,var(--gps-blue)0%,#001122 100%); min-height:100vh; color:var(--text-dark); line-height:1.6; }
        .container { max-width:100%; min-height:100vh; display:flex; flex-direction:column; }

        .corporate-header { background:var(--white); padding:1rem; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 12px rgba(0,0,0,0.12); position:sticky; top:0; z-index:100; }
        .logo-gps { font-weight:800; color:var(--gps-blue); font-size:1.1rem; }
        .system-title { font-weight:800; color:var(--gps-blue); flex:1; text-align:center; font-size:1.15rem; }
        .logo-multiplan { font-weight:700; color:var(--multiplan-green); text-transform:uppercase; font-size:0.9rem; }

        .screen { display:none; flex:1; flex-direction:column; }
        .screen.active { display:flex; }

        .login-screen { justify-content:center; padding:2rem 1.2rem; background:rgba(0,0,0,0.04); }
        .login-card { background:var(--white); border-radius:24px; padding:2.4rem 1.8rem; box-shadow:0 15px 50px rgba(0,0,0,0.22); max-width:440px; width:100%; margin:0 auto; }
        .login-icon { width:100px; height:100px; background:linear-gradient(135deg,var(--gps-blue)0%,var(--multiplan-green)100%); border-radius:50%; margin:0 auto 1.8rem; display:flex; align-items:center; justify-content:center; font-size:3.5rem; box-shadow:0 12px 32px rgba(0,51,102,0.28); }
        .login-title { text-align:center; color:var(--gps-blue); font-size:1.8rem; font-weight:800; margin-bottom:0.6rem; }
        .login-subtitle { text-align:center; color:var(--gray-dark); font-size:1rem; margin-bottom:2.4rem; }
        .form-group { margin-bottom:1.5rem; }
        .form-label { display:block; margin-bottom:0.6rem; font-weight:700; font-size:1rem; }
        .form-input { width:100%; padding:1.2rem; border:2px solid var(--gray-medium); border-radius:12px; font-size:1.15rem; background:var(--gray-light); transition:border-color 0.2s; }
        .form-input:focus { border-color:var(--gps-blue); background:white; outline:none; box-shadow:0 0 0 4px rgba(0,51,102,0.12); }
        .btn-primary { width:100%; padding:1.3rem; background:linear-gradient(135deg,var(--gps-blue)0%,var(--gps-blue-light)100%); color:white; border:none; border-radius:12px; font-size:1.15rem; font-weight:800; cursor:pointer; transition:transform 0.1s; }
        .btn-primary:active { transform:scale(0.98); }
        .error-message { background:#FDEDEC; color:var(--danger); padding:1.2rem; border-radius:10px; margin-bottom:1.5rem; display:none; border-left:4px solid var(--danger); font-weight:600; }

        .start-screen { justify-content:center; align-items:center; padding:2rem 1.2rem; }
        .welcome-card { background:rgba(255,255,255,0.15); backdrop-filter:blur(12px); border-radius:24px; padding:3rem 2.2rem; text-align:center; color:white; max-width:420px; width:100%; box-shadow:0 12px 40px rgba(0,0,0,0.25); }
        .btn-iniciar { background:linear-gradient(135deg,var(--multiplan-green)0%,var(--multiplan-green-light)100%); color:white; padding:1.6rem; border:none; border-radius:16px; font-size:1.35rem; font-weight:800; width:100%; cursor:pointer; margin:1.8rem 0; min-height:64px; }
        .btn-sair { background:transparent; border:2px solid rgba(255,255,255,0.7); color:white; padding:1.3rem; border-radius:14px; font-weight:700; width:100%; cursor:pointer; min-height:58px; }

        .leitura-screen { background:#f9fafc; padding:1.5rem 1rem 13rem; }
        .progress-container { background:var(--white); margin-bottom:1.5rem; padding:1.5rem; border-radius:20px; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
        .progress-header { display:flex; justify-content:space-between; margin-bottom:0.8rem; font-size:1.15rem; font-weight:600; }
        .progress-bar-bg { height:16px; background:var(--gray-medium); border-radius:8px; overflow:hidden; }
        .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--multiplan-green)0%,var(--multiplan-green-light)100%); transition:width 0.5s ease; }
        .local-selector { margin:0 0 1.5rem; }
        .local-selector select { width:100%; padding:1.3rem; border-radius:14px; font-size:1.2rem; font-weight:700; border:2px solid var(--gray-medium); background:white; }
        .locais-list { padding:0; }
        .hidrometro-item { background:var(--white); border-radius:20px; padding:1.8rem; margin-bottom:1.6rem; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
        .hidrometro-item.completo { background:#E8F8F5; border:2px solid var(--multiplan-green); }
        .hidrometro-tipo { font-weight:800; color:var(--gps-blue); margin-bottom:0.8rem; font-size:1.3rem; }
        .leitura-anterior { color:#555; font-size:1.05rem; margin-bottom:0.6rem; font-weight:500; }
        .leitura-field { margin-bottom:1rem; }
        .input-field { width:100%; padding:1.4rem; border:2px solid var(--gray-medium); border-radius:14px; font-size:1.5rem; text-align:center; font-weight:700; min-height:60px; }
        .input-field.erro { border-color:var(--danger); background:#FDEDEC; }
        .consumo-info { font-size:1.1rem; color:#444; margin:0.8rem 0; font-weight:600; }
        .alerta-variacao { display:none; background:#FFF3E0; border:1px solid var(--warning); color:#E65100; padding:1.3rem; border-radius:14px; margin:1.2rem 0; font-weight:700; font-size:1.05rem; }
        .alerta-variacao.negativo { background:#FFEBEE; border-color:var(--danger); color:var(--danger); }
        .alerta-variacao.show { display:block; }
        .justificativa { display:none; margin-top:1.3rem; }
        .justificativa.show { display:block; }
        .justificativa textarea { width:100%; padding:1.3rem; border:2px solid var(--danger); border-radius:14px; min-height:150px; font-size:1.1rem; }
        .foto-section { margin-top:1.5rem; }
        .foto-btn { width:100%; padding:1.4rem; background:linear-gradient(var(--multiplan-green),var(--multiplan-green-light)); color:white; border:none; border-radius:14px; font-weight:800; font-size:1.15rem; cursor:pointer; text-align:center; min-height:60px; }
        .foto-btn.tem-foto { background:#E8F8F5; color:var(--multiplan-green); border:2px solid var(--multiplan-green); }
        .foto-preview { width:100%; max-height:280px; object-fit:cover; border-radius:14px; margin-top:1.3rem; display:none; box-shadow:0 6px 18px rgba(0,0,0,0.1); }
        .foto-preview.show { display:block; }

        .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:var(--white); padding:1.4rem 1.6rem 2.5rem; box-shadow:0 -10px 35px rgba(0,0,0,0.14); display:none; z-index:1000; }
        .btn-finalizar { width:100%; padding:1.6rem; border:none; border-radius:16px; font-size:1.35rem; font-weight:800; cursor:not-allowed; background:var(--gray-medium); color:#666; min-height:64px; }
        .btn-finalizar.ativo { background:linear-gradient(135deg,var(--multiplan-green)0%,var(--multiplan-green-light)100%); color:white; cursor:pointer; }

        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,51,102,0.96); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:white; }
        .loading-overlay.show { display:flex; }
        .spinner { width:90px; height:90px; border:10px solid rgba(255,255,255,0.2); border-top-color:var(--multiplan-green); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="corporate-header" id="corporateHeader" style="display:none;">
            <div class="logo-gps">Grupo GPS</div>
            <div class="system-title">Leitura de Hidrômetros</div>
            <div class="logo-multiplan">MULTIPLAN</div>
        </div>

        <div id="loginScreen" class="login-screen screen active">
            <div class="login-card">
                <div class="login-icon">💧</div>
                <h1 class="login-title">Leitura de Hidrômetros</h1>
                <p class="login-subtitle">Grupo GPS • Multiplan</p>
                <div id="loginError" class="error-message"></div>
                <div class="form-group">
                    <label class="form-label">Usuário</label>
                    <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="Digite sua senha">
                </div>
                <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
            </div>
        </div>

        <div id="startScreen" class="start-screen screen">
            <div class="welcome-card">
                <div style="font-size:3.5rem;margin-bottom:1.2rem;">👋</div>
                <h2>Olá, <span id="nomeTecnico"></span></h2>
                <p style="margin:1.8rem 0;">Pronto para iniciar a leitura?</p>
                <button class="btn-iniciar" onclick="iniciarLeitura()">INICIAR LEITURA DOS HIDRÔMETROS</button>
                <button class="btn-sair" onclick="logout()">SAIR</button>
            </div>
        </div>

        <div id="leituraScreen" class="leitura-screen screen">
            <div class="progress-container">
                <div class="progress-header">
                    <span>Progresso da Ronda</span>
                    <span id="progressoTexto">0/55</span>
                </div>
                <div class="progress-bar-bg"><div id="progressoBarra" class="progress-bar-fill" style="width:0%"></div></div>
            </div>

            <div class="local-selector">
                <select id="localSelect" onchange="mostrarHidrometrosDoLocal(this.value)">
                    <option value="">Selecione o local</option>
                </select>
            </div>

            <div id="hidrometrosContainer" class="locais-list"></div>
        </div>

        <div id="bottomBar" class="bottom-bar">
            <button id="btnFinalizar" class="btn-finalizar" disabled onclick="finalizarRonda()">Finalizar Ronda</button>
        </div>

        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Processando...</div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVN-BQ4mDQFRgLoNtDyL4nHatb-kxj9FUYDL4-l3od_MWAvhzkmhm9ouwJrGLPADyDtw/exec';

        let tecnico = null;
        let hidrometros = [];
        let locaisUnicos = [];

        function showLoading(txt) {
            document.getElementById('loadingText').textContent = txt;
            document.getElementById('loading').classList.add('show');
        }
        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }
        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            const screen = document.getElementById(screenId);
            if (screen) screen.classList.add('active');
        }

        async function fazerLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return showError('Preencha usuário e senha');

            showLoading('Autenticando...');

            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'text/plain;charset=utf-8'},
                    body: JSON.stringify({action: 'login', usuario: user, senha: pass})
                });
                const data = await res.json();

                if (!data.success) throw new Error(data.message || 'Usuário ou senha inválidos');

                tecnico = {nome: data.nome, usuario: data.usuario};
                localStorage.setItem('tecnico', JSON.stringify(tecnico));

                showScreen('startScreen');
                document.getElementById('corporateHeader').style.display = 'flex';
                document.getElementById('nomeTecnico').textContent = tecnico.nome;

            } catch (err) {
                showError(err.message);
            } finally {
                hideLoading();
            }
        }

        async function iniciarLeitura() {
            showLoading('Carregando hidrômetros...');

            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'text/plain;charset=utf-8'},
                    body: JSON.stringify({action: 'iniciar', usuario: tecnico.usuario})
                });
                const data = await res.json();

                if (!data.success) throw new Error(data.message || 'Erro ao iniciar');

                hidrometros = data.hidrometros.map(h => ({
                    id: h.id,
                    local: h.local,
                    tipo: h.tipo,
                    leituraAnterior: parseFloat(h.leituraAnterior) || 0,
                    consumoAnterior: parseFloat(h.consumoAnterior) || 0,  // Novo campo!
                    leituraAtual: '',
                    foto: null,
                    justificativa: '',
                    variacao: 0
                }));

                locaisUnicos = [...new Set(hidrometros.map(h => h.local))];

                showScreen('leituraScreen');
                document.getElementById('bottomBar').style.display = 'block';

                preencherSelectLocais();
                mostrarHidrometrosDoLocal(locaisUnicos[0] || '');

            } catch (err) {
                alert('Erro ao iniciar: ' + err.message);
            } finally {
                hideLoading();
            }
        }

        function preencherSelectLocais() {
            const select = document.getElementById('localSelect');
            select.innerHTML = '<option value="">Selecione o local</option>';
            locaisUnicos.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l;
                opt.textContent = l;
                select.appendChild(opt);
            });
        }

        function mostrarHidrometrosDoLocal(local) {
            const container = document.getElementById('hidrometrosContainer');
            container.innerHTML = '';

            if (!local) return;

            hidrometros.filter(h => h.local === local).forEach(h => {
                const consumoDia = h.leituraAtual - h.leituraAnterior;
                const variacao = h.consumoAnterior > 0 ? ((consumoDia - h.consumoAnterior) / h.consumoAnterior) * 100 : 0;

                const item = document.createElement('div');
                item.className = `hidrometro-item ${isCompleto(h) ? 'completo' : ''}`;
                item.innerHTML = `
                    <div class="hidrometro-tipo">${h.tipo}</div>
                    <div class="leitura-anterior">Leitura anterior: <strong>${h.leituraAnterior.toFixed(0)}</strong></div>
                    <div class="leitura-field">
                        <input type="number" step="0.01" class="input-field" id="input-${h.id}" value="${h.leituraAtual||''}" 
                               oninput="atualizarLeitura('${h.id}', this.value)" placeholder="Leitura atual">
                    </div>
                    <div class="consumo-info">
                        Consumo do dia: <strong>${isNaN(consumoDia) ? '-' : consumoDia.toFixed(2)}</strong><br>
                        Variação: <strong>${h.consumoAnterior > 0 ? variacao.toFixed(1) + '%' : '-'}</strong>
                    </div>
                    <div id="alerta-${h.id}" class="alerta-variacao"></div>
                    <div id="just-${h.id}" class="justificativa">
                        <textarea placeholder="Justificativa obrigatória" oninput="h.justificativa=this.value; atualizarProgresso()">${h.justificativa||''}</textarea>
                    </div>
                    <div class="foto-section">
                        <label class="foto-btn ${h.foto ? 'tem-foto' : ''}">
                            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="capturarFoto('${h.id}', this)">
                            Tirar foto da leitura
                        </label>
                        <img id="preview-${h.id}" class="foto-preview ${h.foto ? 'show' : ''}" src="${h.foto||''}">
                    </div>
                `;
                container.appendChild(item);
            });
            atualizarProgresso();
        }

        function atualizarLeitura(id, valor) {
            const h = hidrometros.find(x => x.id === id);
            if (!h) return;

            h.leituraAtual = parseFloat(valor) || 0;

            const anterior = h.leituraAnterior;
            const atual = h.leituraAtual;
            const consumoDia = atual - anterior;

            let precisaJust = false;
            let mensagem = '';
            let classeAlerta = '';

            if (!isNaN(atual)) {
                if (consumoDia < 0) {
                    precisaJust = true;
                    mensagem = '⚠️ Consumo menor que ontem!';
                    classeAlerta = 'negativo';
                } else if (h.consumoAnterior > 0) {
                    const variacao = ((consumoDia - h.consumoAnterior) / h.consumoAnterior) * 100;
                    h.variacao = variacao;
                    if (variacao > 20) {
                        precisaJust = true;
                        mensagem = `⚠️ Consumo +${variacao.toFixed(1)}% maior que ontem!`;
                    }
                }
            }

            const alerta = document.getElementById(`alerta-${id}`);
            const just = document.getElementById(`just-${id}`);
            const input = document.getElementById(`input-${id}`);

            alerta.className = 'alerta-variacao' + (precisaJust ? ' show ' + classeAlerta : '');
            alerta.textContent = mensagem;

            just.classList.toggle('show', precisaJust);
            input.classList.toggle('erro', precisaJust);

            // Atualiza consumo e variação no DOM
            const consumoEl = alerta.parentElement.querySelector('.consumo-info');
            if (consumoEl) {
                consumoEl.innerHTML = `
                    Consumo do dia: <strong>${isNaN(consumoDia) ? '-' : consumoDia.toFixed(2)}</strong><br>
                    Variação: <strong>${h.consumoAnterior > 0 ? h.variacao.toFixed(1) + '%' : '-'}</strong>
                `;
            }

            atualizarProgresso();
        }

        function capturarFoto(id, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const h = hidrometros.find(x => x.id === id);
                if (h) {
                    h.foto = e.target.result;
                    const preview = document.getElementById(`preview-${id}`);
                    preview.src = h.foto;
                    preview.classList.add('show');
                    input.parentElement.classList.add('tem-foto');
                    input.parentElement.innerHTML = 'Foto adicionada ✓';
                    atualizarProgresso();
                }
            };
            reader.readAsDataURL(file);
        }

        function isCompleto(h) {
            if (!h.leituraAtual || isNaN(h.leituraAtual)) return false;
            const consumoDia = h.leituraAtual - h.leituraAnterior;
            let precisaJust = false;
            if (consumoDia < 0) precisaJust = true;
            else if (h.consumoAnterior > 0) {
                const variacao = ((consumoDia - h.consumoAnterior) / h.consumoAnterior) * 100;
                if (variacao > 20) precisaJust = true;
            }
            if (precisaJust && (!h.justificativa || !h.justificativa.trim())) return false;
            return !!h.foto;
        }

        function atualizarProgresso() {
            const total = hidrometros.length;
            const completos = hidrometros.filter(isCompleto).length;
            document.getElementById('progressoTexto').textContent = `${completos}/${total}`;
            document.getElementById('progressoBarra').style.width = `${total ? (completos/total)*100 : 0}%`;

            const btn = document.getElementById('btnFinalizar');
            btn.disabled = completos !== total;
            btn.classList.toggle('ativo', completos === total);
        }

        async function finalizarRonda() {
            if (!confirm('Finalizar ronda?')) return;
            showLoading('Salvando leituras...');
            try {
                alert('Ronda finalizada com sucesso!');
                logout();
            } finally {
                hideLoading();
            }
        }

        function logout() {
            localStorage.removeItem('tecnico');
            tecnico = null;
            hidrometros = [];
            locaisUnicos = [];
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('loginScreen').classList.add('active');
            document.getElementById('corporateHeader').style.display = 'none';
            document.getElementById('bottomBar').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        window.onload = function() {
            const saved = localStorage.getItem('tecnico');
            if (saved) {
                try {
                    tecnico = JSON.parse(saved);
                    document.getElementById('corporateHeader').style.display = 'flex';
                    document.getElementById('startScreen').classList.add('active');
                    document.getElementById('nomeTecnico').textContent = tecnico.nome;
                } catch (e) {
                    localStorage.removeItem('tecnico');
                    document.getElementById('loginScreen').classList.add('active');
                }
            } else {
                document.getElementById('loginScreen').classList.add('active');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password')?.addEventListener('keypress', e => {
                if (e.key === 'Enter') fazerLogin();
            });
        });
    </script>
</body>
</html>
