<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f4f6;
}

header{
background:#0b2a5b;
color:white;
padding:14px;
text-align:center;
font-size:20px;
}

header span{
color:#1bb34a;
}

.container{
padding:15px;
}

.card{
background:white;
padding:18px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#0b2a5b;
color:white;
border:none;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>
Grupo GPS <span>Multiplan</span>
</header>

<div class="container">

<div id="login" class="card">

<h3>Login</h3>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="app" class="hidden">

<div class="card">

<h3>Leitura</h3>

<select id="hidro"></select>

<input id="anterior" readonly>

<input id="atual" placeholder="Leitura Atual">

<input type="file" id="foto" accept="image/*" capture="camera">

<button onclick="registrar()">Registrar</button>

</div>

<div class="card">

<h3>Histórico</h3>

<div id="historico"></div>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbykjrah5er_sxiBM2jDmxBxLBUZox7NJQbS6v-DCUFG_h6MUtNX8ezKmL71Zyp4pvYtIg/exec"

let usuario=""

async function login(){

let u=user.value
let p=pass.value

let r=await fetch(API+"?action=login&user="+u+"&pass="+p)
let d=await r.json()

if(d.success){

usuario=d.usuario

login.classList.add("hidden")
app.classList.remove("hidden")

carregar()

}

}

async function carregar(){

let r=await fetch(API+"?action=hidrometros")
let dados=await r.json()

hidro.innerHTML=""

dados.forEach(h=>{

let o=document.createElement("option")
o.value=h.id
o.text=h.id+" - "+h.local

hidro.appendChild(o)

})

}

async function registrar(){

if(!foto.files[0]){
alert("Foto obrigatória")
return
}

let file=foto.files[0]

let reader=new FileReader()

reader.onload=async function(){

let base64=reader.result

let anterior=0
let atual=Number(document.getElementById("atual").value)

let consumo=atual-anterior

let payload={

action:"salvarLeitura",
sessao:"R"+Date.now(),
tecnico:usuario,
hidrometro:hidro.value,
local:"",
tipo:"",
anterior:anterior,
atual:atual,
consumo:consumo,
foto:base64

}

await fetch(API,{
method:"POST",
body:JSON.stringify(payload)
})

alert("Leitura enviada")

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
