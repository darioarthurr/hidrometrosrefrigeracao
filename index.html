<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#003366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hidrômetros GPS">
    <title>Leitura de Hidrômetros v2.5.2 | Grupo GPS • Multiplan</title>
   
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
   
    <!-- Chart.js para Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
   
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="app">
        <!-- Loading Global - CORRIGIDO -->
        <div id="loadingGlobal" class="loading-overlay">
            <div class="spinner"></div>
            <div id="loadingText" class="loading-text">Carregando...</div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- TELA LOGIN -->
        <section id="loginScreen" class="screen active">
            <div class="login-container">
                <div class="login-card">
                    <div class="brand-header">
                        <div class="logo-gps">Grupo GPS</div>
                        <div class="logo-separator">•</div>
                        <div class="logo-multiplan">MULTIPLAN</div>
                    </div>
                   
                    <div class="login-icon">
                        <span>💧</span>
                        <div class="pulse-ring"></div>
                    </div>
                   
                    <h1 class="login-title">Leitura de Hidrômetros</h1>
                    <p class="login-version">v2.5.2</p>
                   
                    <div id="loginError" class="error-message"></div>
                   
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label class="form-label">Usuário</label>
                            <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" autocomplete="off" required>
                        </div>
                       
                        <div class="form-group">
                            <label class="form-label">Senha</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
                                <button type="button" class="toggle-password" onclick="app.togglePassword()">👁️</button>
                            </div>
                        </div>
                       
                        <button type="submit" class="btn-primary btn-login">
                            <span>Entrar no Sistema</span>
                            <div class="btn-shine"></div>
                        </button>
                    </form>
                   
                    <div class="login-footer">
                        <p>Sistema exclusivo para equipe autorizada</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- HEADER CORPORATIVO -->
        <header id="corporateHeader" class="corporate-header" style="display:none;">
            <div class="header-brand">
                <span class="header-gps">Grupo GPS</span>
                <span class="header-separator">|</span>
                <span class="header-multiplan">MULTIPLAN</span>
            </div>
            <div class="header-title">Leitura de Hidrômetros</div>
            <div class="header-user">
                <span id="userName" class="user-name"></span>
                <span id="userBadge" class="user-badge">OP</span>
                <button class="btn-icon" onclick="app.logout()" title="Sair">🚪</button>
            </div>
        </header>

        <!-- MENU DE NAVEGAÇÃO (Admin) -->
        <nav id="adminNav" class="admin-nav" style="display:none;">
            <!-- ... (mantido igual) ... -->
        </nav>

        <!-- Todas as outras telas (startScreen, leituraScreen, dashboard, etc.) permanecem iguais à sua versão anterior -->

        <!-- (O resto do HTML é exatamente o mesmo que você já tinha) -->

    </div>
    <script src="assets/app.js"></script>
</body>
</html>
