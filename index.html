<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitura Hidrometros</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

#reader{
width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<div id="loginScreen" class="container">

<h2>Login</h2>

<input id="username" placeholder="Usuário">

<input id="password" type="password" placeholder="Senha">

<button onclick="fazerLogin()">Entrar</button>

</div>

<div id="qrScreen" class="container" style="display:none">

<h2>Bem vindo <span id="nomeTecnico"></span></h2>

<p>Escaneie o QR da torre</p>

<div id="reader"></div>

</div>

<script>

const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwBbY3PpzZfmzw7raBf1k5714hlsmI5YpoHHLFWSDILMHiaV0vYKNLbuoWjX12RBAB5SA/exec"

let tecnico=null

async function fazerLogin(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

const res=await fetch(`${APPS_SCRIPT_URL}?action=login&user=${user}&pass=${pass}`)

const data=await res.json()

if(data.success){

tecnico=data

document.getElementById("loginScreen").style.display="none"

document.getElementById("qrScreen").style.display="block"

document.getElementById("nomeTecnico").innerText=data.nome

iniciarScanner()

}else{

alert("Login inválido")

}

}

function iniciarScanner(){

const qr=new Html5Qrcode("reader")

qr.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(decoded)=>{

if(decoded==="TORRES-HIDROMETROS"){

alert("QR reconhecido")

qr.stop()

}

}

)

}

</script>

</body>
</html>
